name: Selenium Login E2E

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  selenium-login:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Serve build
        run: |
          mkdir -p gh-pages-preview/Krinterior-AI/web
          cp -R build/. gh-pages-preview/Krinterior-AI/web/
          npx serve gh-pages-preview --listen 8080 &

      - name: Run Selenium login test
        env:
          APP_BASE_URL: http://localhost:8080
          LOGIN_PATH: /Krinterior-AI/web/#/login
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: npm run login
